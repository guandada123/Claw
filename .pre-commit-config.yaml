# Pre-commit hooks — Claw (A股投顾自动化助手)
# Install: pip install pre-commit && pre-commit install --hook-type commit-msg
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: ^\.workbuddy/data/
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, --config, ruff.toml]
        files: ^\.workbuddy/
      - id: ruff-format
        args: [--config, ruff.toml]
        files: ^\.workbuddy/

  # Conventional Commits 格式校验
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commits
        entry: python .workbuddy/scripts/check-commit-msg.py
        language: python
        stages: [commit-msg]
        always_run: true
