# Claw — 容器化编排
# 用法:
#   docker-compose run --rm claw python3 .workbuddy/scripts/sim_trade.py cmd_check
#   docker-compose run --rm claw python3 .workbuddy/scripts/market_data.py cmd_macro_snapshot
#   docker-compose run --rm claw make test

version: "3.9"

services:
  claw:
    build: .
    image: claw:latest
    container_name: claw
    volumes:
      # 数据持久化
      - ./.workbuddy/data:/app/.workbuddy/data
      - ./.workbuddy/logs:/app/.workbuddy/logs
      # 配置文件（只读）
      - ./.env:/app/.env:ro
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Asia/Shanghai
    restart: "no"  # 按需执行，不自动重启
