# ============================================================
# Claw CI — v2.0 (Unified Standard)
# Phases: Lint → Type Check → Test → Security
# ============================================================
name: Claw CI

on:
  pull_request:
    paths: [".workbuddy/**"]
  push:
    branches: [main]
    paths: [".workbuddy/**"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"
  RUFF_CONFIG: ruff.toml
  COV_FAIL_UNDER: 65

jobs:
  pre-commit:
    name: Pre-commit Hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "pyproject.toml"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "pyproject.toml"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff lint
        run: ruff check .workbuddy/ --config ${{ env.RUFF_CONFIG }}
      - name: Ruff format check
        run: ruff format --check .workbuddy/ --config ${{ env.RUFF_CONFIG }}

  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "pyproject.toml"
      - name: Install mypy
        run: pip install mypy
      - name: Type check
        run: |
          cd .workbuddy
          mypy scripts/ lib/ \
            --ignore-missing-imports \
            --check-untyped-defs \
            --warn-return-any \
            --warn-redundant-casts || echo "::warning::mypy 发现类型提示问题（非阻塞）"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "pyproject.toml"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      - name: Run tests with coverage
        run: |
          cd .workbuddy && python -m pytest tests/ -v --tb=short \
            --cov=lib \
            --cov-report=term-missing \
            --cov-fail-under=70

  benchmark:
    name: Benchmark Regression Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "pyproject.toml"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark
      - name: Restore benchmark history
        uses: actions/cache@v6
        with:
          path: .workbuddy/.benchmarks
          key: benchmark-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: benchmark-${{ github.ref_name }}-
      - name: Run benchmark
        run: |
          cd .workbuddy && python -m pytest tests/test_benchmark.py --benchmark-only --benchmark-json=../benchmark-results.json -v
      - name: Compare with baseline (warning only)
        run: |
          if [ -f .workbuddy/.benchmarks/baseline.json ]; then
            python .workbuddy/scripts/benchmark_compare.py .workbuddy/.benchmarks/baseline.json benchmark-results.json || echo "::warning::性能回归检测：部分测试变慢，请检查"
          else
            echo "No baseline found, skipping comparison"
          fi
      - name: Save baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cp benchmark-results.json .workbuddy/.benchmarks/baseline.json
          echo "Baseline updated on main"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: "pyproject.toml"
      - name: Install scanners
        run: pip install bandit safety
      - name: Bandit (code-level scan)
        run: bandit -r .workbuddy/scripts/ .workbuddy/lib/ -ll --skip B101,B324,B310,B108,B306
      - name: Safety (dependency scan)
        run: safety check --full-report || true
      - name: Secret scan
        run: |
          if grep -rn "PRIVATE KEY\|-----BEGIN RSA\|-----BEGIN OPENSSH" .workbuddy/scripts/ .workbuddy/lib/ 2>/dev/null; then
            echo "::error::Private key detected in source code"
            exit 1
          fi
          echo "No secrets found"
