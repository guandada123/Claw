name: CI - Quality Gate

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  contents: read
  security-events: write

jobs:
  quality-gate:
    uses: guandada123/engineering-audit-kit/.github/workflows/quality-gate.yml@v2
    with:
      run-python: auto
      run-php: off
      run-eslint: false
      run-prettier: false
      node-version: '20'
      npm-audit-level: high
    secrets: inherit

concurrency:
  group: ci-quality-gate-${{ github.ref }}
  cancel-in-progress: true
